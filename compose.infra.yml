services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wildtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wildtrack}
      POSTGRES_DB: ${POSTGRES_DB:-wildtrack}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-wildtrack}", "-d", "${POSTGRES_DB:-wildtrack}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-wildtrack_device}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-wildtrack_pass}
    # Creates the passwd file from env vars on every startup, then starts broker.
    command:
      - sh
      - -c
      - |
        mosquitto_passwd -c -b /mosquitto/config/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 1883 -t healthcheck -m ping -u $$MQTT_USERNAME -P $$MQTT_PASSWORD -q 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 8s
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  minio_data:
  mosquitto_data:
  mosquitto_log:
